packages:
  - 'packages/*'
  - '!**/test/**'
allowBuilds:
  '@nestjs/core': true
  electron: true
  electron-winstaller: true
  esbuild: true
  simple-git-hooks: true
onlyBuiltDependencies:
  - '@nestjs/core'
  - check-package-exists
  - electron
  - electron-winstaller
  - esbuild
  - mono-release
  - simple-git-hooks

shellEmulator: true
trustPolicy: off
